<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Camera Capture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e2e2e8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }

    h1 {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555570;
    }

    #preview-wrap {
      position: relative;
      width: 320px;
      height: 240px;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #1e1e2e;
    }

    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror for front cam */
      display: block;
    }

    #flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s ease;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    #dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
    }
    #dot.active { background: #00e676; box-shadow: 0 0 6px #00e676; }
    #dot.error  { background: #ff1744; box-shadow: 0 0 6px #ff1744; }

    #status-text { color: #888; }

    #counter {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #e2e2e8;
      min-width: 3ch;
      text-align: center;
    }

    #counter-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444460;
      text-align: center;
      margin-top: -18px;
    }

    #log {
      width: 320px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 0.7rem;
      line-height: 1.6;
      color: #444460;
      border-top: 1px solid #1a1a28;
      padding-top: 12px;
    }

    #log .ok  { color: #00e676; }
    #log .err { color: #ff1744; }

    /* hidden canvas for capture */
    canvas { display: none; }
  </style>
</head>
<body>

  <h1>Live Capture</h1>

  <div id="preview-wrap">
    <video id="preview" autoplay playsinline muted></video>
    <div id="flash"></div>
  </div>

  <div id="status-bar">
    <div id="dot"></div>
    <span id="status-text">Requesting camera…</span>
  </div>

  <div id="counter">0</div>
  <div id="counter-label">frames sent</div>

  <div id="log"></div>

  <canvas id="canvas"></canvas>

  <script>
    // ─── CONFIG ────────────────────────────────────────────────
    const SERVER_URL   = 'http://0.0.0.0:3000'
    const INTERVAL_MS  = 1000;   // capture every 1 second
    const JPEG_QUALITY = 0.75;   // 0.0 – 1.0
    const IMG_WIDTH    = 640;
    const IMG_HEIGHT   = 480;
    // ───────────────────────────────────────────────────────────

    const video      = document.getElementById('preview');
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const counter    = document.getElementById('counter');
    const log        = document.getElementById('log');
    const flash      = document.getElementById('flash');

    canvas.width  = IMG_WIDTH;
    canvas.height = IMG_HEIGHT;

    let captureCount = 0;

    function setStatus(msg, state = '') {
      statusText.textContent = msg;
      dot.className = state;
    }

    function addLog(msg, type = '') {
      const line = document.createElement('div');
      line.className = type;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.prepend(line);
      // keep log short
      while (log.children.length > 30) log.removeChild(log.lastChild);
    }

    function triggerFlash() {
      flash.style.opacity = '0.35';
      setTimeout(() => { flash.style.opacity = '0'; }, 80);
    }

    async function captureAndSend() {
      if (video.readyState < 2) return; // not ready yet

      // draw current video frame onto canvas
      ctx.drawImage(video, 0, 0, IMG_WIDTH, IMG_HEIGHT);

      canvas.toBlob(async (blob) => {
        if (!blob) return;
        triggerFlash();

        const formData = new FormData();
        const filename = `capture_${Date.now()}.jpg`;
        formData.append('image', blob, filename);

        try {
          const res = await fetch(SERVER_URL, {
            method: 'POST',
            body: formData,
          });

          if (res.ok) {
            captureCount++;
            counter.textContent = captureCount;
            addLog(`✓ ${filename} sent`, 'ok');
          } else {
            addLog(`✗ Server responded ${res.status}`, 'err');
          }
        } catch (err) {
          addLog(`✗ ${err.message}`, 'err');
          setStatus('Send error — retrying…', 'error');
        }
      }, 'image/jpeg', JPEG_QUALITY);
    }

    async function startCapture() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: IMG_WIDTH, height: IMG_HEIGHT },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();

        setStatus('Capturing…', 'active');
        addLog('Camera started', 'ok');

        setInterval(captureAndSend, INTERVAL_MS);
      } catch (err) {
        setStatus('Camera access denied', 'error');
        addLog(`Camera error: ${err.message}`, 'err');
        dot.className = 'error';
      }
    }

    startCapture();
  </script>
</body>
</html>
